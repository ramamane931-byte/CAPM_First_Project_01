_schema-version: 3.3.0
ID: ramacapapp_02
version: 1.0.0
description: RAMA Trainings Lifes first CAP app
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
##this is our UI module added = fioriui+approuter
  - name: ramacapapp_02-ui
    type: nodejs
    path: app
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    requires:
      - name: ramacapapp_02-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          strictSSL: true
          forwardAuthToken: true
          url: '~{srv-url}'

##end of code
  - name: ramacapapp_02-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: '${default-url}'
    requires:
      - name: ramacapapp_02-auth
      - name: ramacapapp_02-db
  - name: ramacapapp_02-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: ramacapapp_02-db
resources:
  - name: ramacapapp_02-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: 'ramacapapp_02-${org}-${space}'
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        role-collections:
          - name: 'Viewer (ramacapapp_02 ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.Viewer
          - name: 'Editor (ramacapapp_02 ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.Editor
          - name: 'userattributes (ramacapapp_02 ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.userattributes
  - name: ramacapapp_02-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
