_schema-version: 3.3.0
ID: ramacapapp_02
version: 1.0.0
description: RAMA Trainings Lifes first CAP app
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  ##this is our UI module added = fioriui+approuter
  - name: ramacapapp_02-ui
    type: nodejs
    path: app
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    properties:
      TENANT_HOST_PATTERN: "^(.*)-${default-uri}"
    requires:
      - name: ramacapapp_02-auth
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          strictSSL: true
          forwardAuthToken: true
          url: '~{srv-url}'
         # SOM-Added: session-21       
      - name: mtx-api
        group: destinations
        properties:
          name: mtx-api # must be used in xs-app.json as well
          url: ~{mtx-url}
      # - name: ramacapapp_02-auth
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
           # EOM-Added: session-21 
  ##end of code
  - name: ramacapapp_02-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: '${default-url}'
    requires:
      - name: ramacapapp_02-auth
      - name: ramacapapp_02-ui-db

  - name: ramacapapp_02-ui-mtx
    type: nodejs
    path: gen/mtx/sidecar
    requires:
      # - name: ramacapapp_02-ui-auth
      - name: ramacapapp_02-auth
      - name: ramacapapp_02-ui-db
      - name: ramacapapp_02-ui-registry
      - name: app-api
        properties:
          SUBSCRIPTION_URL: ~{app-protocol}://\${tenant_subdomain}-~{app-uri}
    build-parameters:
      builder: npm-ci
    parameters:
      instances: 1
      memory: 256M
      disk-quota: 512M
    hooks:
      - name: upgrade-all
        type: task
        phases:
          - blue-green.application.before-start.idle
          - deploy.application.before-start
        parameters:
          name: upgrade
          memory: 512M # increase as required
          disk-quota: 768M # increase as required
          command: cds-mtx upgrade '*'
    provides:
      - name: mtx-api
        properties:
          mtx-url: ${default-url}
          # SOM-deleted: session-21
  # - name: ramacapapp_02-ui
