resources:
  - name: ramacapapp_02-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: 'ramacapapp_02-${org}-${space}'
        tenant-mode: shared
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
          redirect-uris:
            - https://*~{app-api/app-uri}/**
        role-collections:
          - name: 'Viewer (ramacapapp_02 ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.Viewer
          - name: 'Editor (ramacapapp_02 ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.Editor
          - name: 'userattributes (ramacapapp_02 ${org}-${space})'
            description: generated
            role-template-references:
              - $XSAPPNAME.userattributes
    requires:
      - name: app-api
  - name: ramacapapp_02-ui-db
    type: org.cloudfoundry.managed-service
    parameters:
      service: service-manager
      service-plan: container
  - name: ramacapapp_02-ui-registry
    type: org.cloudfoundry.managed-service
    requires:
      - name: mtx-api
    parameters:
      service: saas-registry
      service-plan: application
      config:
        xsappname: ramacapapp_02-ui-${org}-${space}
        appName: ramacapapp_02-ui-${org}-${space}
        displayName: ramacapapp_02-ui
        description: A simple CAP project.
        category: 'Category'
        appUrls:
          getDependencies: ~{mtx-api/mtx-url}/-/cds/saas-provisioning/dependencies
          onSubscription: ~{mtx-api/mtx-url}/-/cds/saas-provisioning/tenant/{tenantId}
          onSubscriptionAsync: true
          onUnSubscriptionAsync: true
          onUpdateDependenciesAsync: true
          callbackTimeoutMillis: 300000 # Increase if your deployments are taking longer than that
